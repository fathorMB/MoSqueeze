name: Build and Push mosqueeze-server Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push to registry'
        required: false
        default: true
        type: boolean
      platforms:
        description: 'Target platforms'
        required: false
        default: 'linux/amd64'
        type: string
      no_cache:
        description: 'Disable cache (rebuild all)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Verify Dockerfile exists
        run: |
          if [ ! -f "src/mosqueeze-server/Dockerfile" ]; then
            echo "::error::Dockerfile not found at src/mosqueeze-server/Dockerfile"
            echo "The mosqueeze-server module has not been implemented yet."
            echo "See: https://github.com/fathorMB/MoSqueeze/issues/70"
            exit 1
          fi
          echo "Dockerfile found, proceeding with build"

  build:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare image name (lowercase)
        id: image
        run: |
          IMAGE_NAME="${{ github.repository_owner }}/mosqueeze-server"
          IMAGE_NAME_LC=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE_NAME_LC" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: ${{ contains(github.event.inputs.platforms || 'linux/amd64', 'linux/arm') }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Build with multi-source cache for faster rebuilds
      # - Registry cache: persists across runs (shared across workflows)
      # - GHA cache: fast local cache within the same run
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/mosqueeze-server/Dockerfile
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64' }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}:buildcache
            type=gha
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}:buildcache,mode=max
          provenance: true
          sbom: true
          build-args: |
            MOSQUEEZE_VERSION=${{ github.ref_name }}