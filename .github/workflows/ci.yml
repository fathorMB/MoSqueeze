name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: microsoft/vcpkg-action@v2
        with:
          vcpkgGitCommitId: 'a34c873a9717bb888ab2f1c77b81dab4e8d40d88'

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        working-directory: build
        run: ctest -C Release --output-on-failure

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ ninja-build pkg-config

      - name: Setup vcpkg
        uses: microsoft/vcpkg-action@v2
        with:
          vcpkgGitCommitId: 'a34c873a9717bb888ab2f1c77b81dab4e8d40d88'

      - name: Configure CMake
        run: cmake -B build -S . -G Ninja -DCMAKE_CXX_COMPILER=g++ -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install cmake ninja

      - name: Setup vcpkg
        uses: microsoft/vcpkg-action@v2
        with:
          vcpkgGitCommitId: 'a34c873a9717bb888ab2f1c77b81dab4e8d40d88'

      - name: Configure CMake
        run: cmake -B build -S . -G Ninja -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure